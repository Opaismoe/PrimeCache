services:
  primecache:
    build: .
    environment:
      - BROWSERLESS_WS_URL=${BROWSERLESS_WS_URL}
      - BROWSERLESS_TOKEN=${BROWSERLESS_TOKEN}
      - API_KEY=${API_KEY}
      - DATABASE_URL=postgres://primecache:${POSTGRES_PASSWORD}@postgres:5432/primecache
      - CONFIG_PATH=/app/config/config.yaml
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      - PORT=3000
      - TIMEZONE=${TIMEZONE:-Europe/Amsterdam}
    volumes:
      - ./config.yaml:/app/config/config.yaml
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=primecache
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=primecache
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U primecache"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:
