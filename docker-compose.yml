services:
  cache-warmer:
    build: .
    environment:
      - BROWSERLESS_WS_URL=ws://browserless:3000/chromium/playwright
      - BROWSERLESS_TOKEN=dev-token
      - API_KEY=dev-api-key-local-only
      - DB_PATH=/app/data/warmer.db
      - CONFIG_PATH=/app/config/config.yaml
      - LOG_LEVEL=debug
      - PORT=3000
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config/config.yaml
    ports:
      - "3000:3000"
    depends_on:
      browserless:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  browserless:
    image: ghcr.io/browserless/chromium:latest
    environment:
      - TOKEN=dev-token
    ports:
      - "3001:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/json/version"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped
