services:
  primecache:
    build: .
    environment:
      - BROWSERLESS_WS_URL=${BROWSERLESS_WS_URL:-ws://browserless:3000/chromium/playwright}
      - BROWSERLESS_TOKEN=${BROWSERLESS_TOKEN:-localtoken}
      - API_KEY=${API_KEY}
      - DATABASE_URL=postgres://primecache:${POSTGRES_PASSWORD}@postgres:5432/primecache
      - CONFIG_PATH=/app/config/config.yaml
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      - PORT=3000
      - TIMEZONE=${TIMEZONE:-Europe/Amsterdam}
    volumes:
      - ./config.yaml:/app/config/config.yaml
    ports:
      - "3000:3000"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      postgres:
        condition: service_healthy
      browserless:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # Browserless — Chromium-as-a-service. Explicit DNS servers prevent ERR_NAME_NOT_RESOLVED
  # inside the container when visiting external domains.
  # Override BROWSERLESS_WS_URL + BROWSERLESS_TOKEN to use an external instance instead.
  browserless:
    image: ghcr.io/browserless/chromium:latest
    environment:
      - TOKEN=${BROWSERLESS_TOKEN:-localtoken}
      - TIMEOUT=60000
      - MAX_CONCURRENT_SESSIONS=5
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=primecache
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=primecache
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U primecache"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:
