<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cache Warmer</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <!-- API Key Modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <h2>API Key Required</h2>
      <p>Enter your API key to access the dashboard.</p>
      <input type="password" id="api-key-input" placeholder="X-API-Key" autocomplete="off">
      <button id="api-key-submit">Connect</button>
      <p id="api-key-error" class="error hidden">Invalid API key. Please try again.</p>
    </div>
  </div>

  <!-- Navigation -->
  <nav>
    <span class="nav-brand">Cache Warmer</span>
    <a href="#dashboard">Dashboard</a>
    <a href="#history">History</a>
    <a href="#config">Config</a>
  </nav>

  <!-- Views -->
  <main>
    <section id="view-dashboard" class="view hidden"></section>
    <section id="view-history" class="view hidden"></section>
    <section id="view-run-detail" class="view hidden"></section>
    <section id="view-config" class="view hidden"></section>
  </main>

  <script type="module" src="/app.js"></script>
</body>
</html>
