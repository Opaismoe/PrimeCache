name: Bug report
description: Report unexpected behavior or a defect
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a problem. **Do not** report security vulnerabilities here — use [Report a vulnerability](https://github.com/Opaismoe/PrimeCache/security/advisories/new) (see [SECURITY.md](https://github.com/Opaismoe/PrimeCache/blob/main/SECURITY.md)).
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Commands, config snippets, or UI steps. Redact secrets.
      placeholder: |
        1. …
        2. …
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, pnpm version, deployment (Docker/local), relevant env shape (no secrets).
      placeholder: |
        - OS: …
        - Node: …
        - PrimeCache commit or version: …
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Optional. Remove tokens and passwords.
