name: Test, build, lint, typecheck

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm -r lint

      # Backend api tests serve GET / from frontend/dist; a clean CI checkout has no dist until built.
      - name: Build frontend
        run: pnpm --filter primecache-frontend build

      - name: Test
        run: pnpm test
